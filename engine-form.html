<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asset Maintenance Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-6">
  <h2 class="text-2xl font-bold text-blue-700 mb-6">Asset Maintenance Details</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-5xl">
    <!-- Left: Details -->
    <div id="dataContainer" class="bg-white rounded-lg shadow p-6"></div>

    <!-- Right: Map -->
    <div id="mapContainer" class="bg-white rounded-lg shadow overflow-hidden"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get("data");

    try {
      const assetData = JSON.parse(decodeURIComponent(dataParam));
      const container = document.getElementById("dataContainer");

      let html = '<div class="grid grid-cols-2 gap-3">';
      for (const [label, value] of Object.entries(assetData)) {
        if (label === "Coords") continue;
        html += `
          <div class="font-semibold text-gray-700">${label}</div>
          <div class="text-gray-900 bg-gray-50 border rounded p-2">${value || "-"}</div>
        `;
      }
      html += "</div>";
      container.innerHTML = html;

      // Map
      if (assetData["Coords"]) {
        const [lat, lon] = assetData["Coords"].split(",").map(x => x.trim());
        if (lat && lon) {
          document.getElementById("mapContainer").innerHTML = `
            <iframe width="100%" height="100%" style="border:0;" loading="lazy" 
              src="https://www.google.com/maps?q=${lat},${lon}&z=15&output=embed">
            </iframe>`;
        }
      }

    } catch (e) {
      document.getElementById("dataContainer").innerHTML = 
        `<p class="text-red-600 font-semibold">Invalid or missing data.</p>`;
    }
  </script>
</body>
</html>
