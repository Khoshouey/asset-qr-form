<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asset Maintenance Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="grid grid-cols-1 md:grid-cols-2 h-screen">
    <!-- Left: Data -->
    <div class="p-6 overflow-y-auto">
      <h1 class="text-2xl font-bold mb-4 text-blue-700">Asset Maintenance Details</h1>
      <div id="data-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>

    <!-- Right: Map -->
    <div id="map"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get("data");
    const coordsParam = params.get("coords");

    if (dataParam) {
      const decoded = decodeURIComponent(dataParam);
      const lines = decoded.split("\n").map(l => l.trim()).filter(l => l);
      const container = document.getElementById("data-container");
      let hasValid = false;

      lines.forEach(line => {
        const [label, ...rest] = line.split(":");
        if (rest.length) {
          hasValid = true;
          const value = rest.join(":").trim();
          const div = document.createElement("div");
          div.className = "bg-white rounded shadow p-3";
          div.innerHTML = `
            <div class="font-semibold text-blue-700">${label}</div>
            <div class="text-gray-800">${value}</div>
          `;
          container.appendChild(div);
        }
      });

      if (!hasValid) {
        container.innerHTML = `<div class="text-red-600 font-bold">⚠️ No valid fields found.</div>`;
      }
    }

    // Map init
    if (coordsParam) {
      const coords = decodeURIComponent(coordsParam).split(",");
      const lat = parseFloat(coords[0]);
      const lng = parseFloat(coords[1]);

      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap`;
      script.defer = true;
      document.head.appendChild(script);

      window.initMap = () => {
        const map = new google.maps.Map(document.getElementById("map"), {
          center: { lat, lng },
          zoom: 15
        });
        new google.maps.Marker({
          position: { lat, lng },
          map: map
        });
      };
    }
  </script>
</body>
</html>
