<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asset Maintenance Details</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map { height: 400px; width: 100%; }
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .data-label {
      font-weight: 600;
      color: #1e3a8a;
      background-color: #f3f4f6;
      padding: 0.5rem;
      border-radius: 0.375rem;
    }
    .data-value {
      text-align: right;
      color: #1f2937;
      background-color: #ffffff;
      padding: 0.5rem;
      border-radius: 0.375rem;
      border: 1px solid #e5e7eb;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white rounded-lg shadow-lg p-6 max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Left: Asset Details -->
    <div>
      <h2 class="text-2xl font-bold mb-4 text-blue-700">Asset Maintenance Details</h2>
      <div id="data-container" class="data-grid"></div>
    </div>

    <!-- Right: Map -->
    <div>
      <h3 class="text-xl font-semibold mb-4 text-gray-800">Asset Location 📍</h3>
      <div id="map" class="rounded-lg shadow"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get("data");
    const coordsParam = params.get("coords");

    // 🧾 Parse and display data
    if (dataParam) {
      const decoded = decodeURIComponent(dataParam);
      const lines = decoded.split("\n").map(l => l.trim()).filter(l => l);
      const container = document.getElementById("data-container");

      if (lines.length === 0) {
        container.innerHTML = `<div class='text-red-600 font-bold col-span-2'>⚠️ No valid fields found.</div>`;
      } else {
        lines.forEach(line => {
          const [label, ...rest] = line.split(":");
          if (rest.length) {
            const value = rest.join(":").trim();
            container.insertAdjacentHTML("beforeend", `
              <div class="data-label">${label}</div>
              <div class="data-value">${value}</div>
            `);
          }
        });
      }
    }

    // 🧭 Map with Leaflet
    if (coordsParam) {
      const coords = decodeURIComponent(coordsParam).split(",");
      const lat = parseFloat(coords[0]);
      const lng = parseFloat(coords[1]);

      const map = L.map('map').setView([lat, lng], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

      L.marker([lat, lng]).addTo(map);
    } else {
      document.getElementById("map").innerHTML =
        `<div class="text-red-600 font-bold text-center p-4">📍 No Coordinates Found</div>`;
    }
  </script>
</body>
</html>
