<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Engine Form</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input, textarea { display: block; margin: 5px 0; padding: 5px; width: 300px; }
  </style>
</head>
<body>
  <h2>Engine Form</h2>

  <input id="pmNumber" placeholder="PM Number" readonly>
  <input id="frequency" placeholder="Frequency" readonly>
  <input id="responsibility" placeholder="Responsibility" readonly>
  <input id="reason" placeholder="Reason Of Work" readonly>
  <input id="condition" placeholder="Condition" readonly>
  <input id="jobPlanner" placeholder="Job Planner" readonly>
  <textarea id="notes" placeholder="Notes" readonly></textarea>
  <input id="coords" placeholder="Coords" readonly>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const encodedData = urlParams.get('data');

    if (encodedData) {
      try {
        const decodedData = JSON.parse(decodeURIComponent(encodedData));
        document.getElementById('pmNumber').value = decodedData["PM Number"] || "";
        document.getElementById('frequency').value = decodedData["Frequency"] || "";
        document.getElementById('responsibility').value = decodedData["Responsibility"] || "";
        document.getElementById('reason').value = decodedData["Reason Of Work"] || "";
        document.getElementById('condition').value = decodedData["Condition"] || "";
        document.getElementById('jobPlanner').value = decodedData["Job Planner"] || "";
        document.getElementById('notes').value = decodedData["Notes"] || "";
        document.getElementById('coords').value = decodedData["Coords"] || "";
      } catch (e) {
        console.error(e);
        alert("Invalid or missing data.");
      }
    } else {
      alert("Invalid or missing data.");
    }
  </script>
</body>
</html>
