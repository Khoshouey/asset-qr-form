<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Engine Form — Asset Details</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --bg: #f4f6f8;
    --text: #333;
    --card-bg: #fff;
    --border: #ddd;
  }

  body {
    font-family: "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    max-width: 800px;
    width: 100%;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: var(--primary-dark);
  }

  .card {
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 20px;
    margin-bottom: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }

  th {
    width: 35%;
    background: #f9fafb;
    font-weight: 600;
  }

  #map {
    width: 100%;
    height: 300px;
    border-radius: 8px;
    overflow: hidden;
  }

  .actions {
    text-align: center;
    margin-top: 15px;
  }

  button {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover {
    background: var(--primary-dark);
  }

  @media (max-width: 600px) {
    th, td {
      display: block;
      width: 100%;
    }
    th { background: #f1f5f9; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🚀 Engine Form — Asset Details</h1>

  <div class="card">
    <table id="assetTable"></table>
  </div>

  <div class="card">
    <h3>📍 Asset Location</h3>
    <div id="map">No coordinates available</div>
  </div>

  <div class="actions">
    <button onclick="window.print()">🖨️ Print Form</button>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const rawData = params.get("data");
  const coords = params.get("coords");
  const table = document.getElementById("assetTable");

  if (rawData) {
    try {
      const dataObj = JSON.parse(decodeURIComponent(rawData));
      table.innerHTML = "";
      for (const key in dataObj) {
        const row = document.createElement("tr");
        const th = document.createElement("th");
        const td = document.createElement("td");
        th.textContent = key;
        td.textContent = dataObj[key];
        row.appendChild(th);
        row.appendChild(td);
        table.appendChild(row);
      }
    } catch (e) {
      table.innerHTML = "<tr><td>Invalid data format</td></tr>";
    }
  } else {
    table.innerHTML = "<tr><td>No data found in QR code</td></tr>";
  }

  if (coords) {
    const [lat, lon] = coords.split(",").map(c => c.trim());
    if (lat && lon) {
      document.getElementById("map").innerHTML = `
        <iframe
          width="100%"
          height="300"
          style="border:0;"
          loading="lazy"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=${lat},${lon}&hl=en&z=16&output=embed">
        </iframe>`;
    }
  }
</script>

</body>
</html>
