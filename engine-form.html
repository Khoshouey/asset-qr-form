<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Engine Form — QR Data Viewer</title>
<style>
  body {
    font-family: "Segoe UI", Roboto, sans-serif;
    background: #f4f6f8;
    padding: 20px;
    color: #333;
  }
  h2 {
    margin-bottom: 20px;
  }
  .data-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    max-width: 800px;
    margin: auto;
  }
  .data-item {
    background: #f9fafb;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ddd;
  }
  .data-item strong {
    display: block;
    margin-bottom: 4px;
    font-size: 14px;
    color: #555;
  }
  #map {
    height: 300px;
    width: 100%;
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  #rawData {
    width: 100%;
    height: 120px;
    margin-top: 20px;
    font-family: monospace;
    display: none; /* hidden unless needed */
  }
</style>
</head>
<body>

<h2>Engine Form — Asset Data</h2>

<div id="data" class="data-container"></div>
<div id="map"></div>
<textarea id="rawData" readonly></textarea>

<script>
  // Get parameters from URL
  const params = new URLSearchParams(window.location.search);
  const rawData = params.get("data");
  const coords = params.get("coords");

  const dataContainer = document.getElementById("data");
  const rawTextarea = document.getElementById("rawData");

  if (rawData) {
    const decodedText = decodeURIComponent(rawData);
    rawTextarea.value = decodedText;

    // ✅ Split the text into lines and parse key/value pairs
    const lines = decodedText.split("\n").filter(line =>
      line.trim() !== "" &&
      !line.startsWith("---")
    );

    lines.forEach(line => {
      const [label, ...rest] = line.split(":");
      const value = rest.join(":").trim();
      const item = document.createElement("div");
      item.className = "data-item";
      item.innerHTML = `<strong>${label.trim()}</strong>${value || ""}`;
      dataContainer.appendChild(item);
    });
  }

  // 🗺 Show Google Map if coordinates exist
  if (coords) {
    const [lat, lon] = decodeURIComponent(coords).split(",").map(c => c.trim());
    if (lat && lon) {
      const mapDiv = document.getElementById("map");
      mapDiv.innerHTML = `<iframe
        width="100%"
        height="300"
        style="border:0;"
        loading="lazy"
        allowfullscreen
        referrerpolicy="no-referrer-when-downgrade"
        src="https://www.google.com/maps?q=${lat},${lon}&z=16&output=embed">
      </iframe>`;
    }
  }
</script>

</body>
</html>
