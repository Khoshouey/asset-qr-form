<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asset Maintenance Details</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f6fa;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }
    #assetDetails {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .label {
      text-align: right;
      font-weight: bold;
      padding-right: 10px;
    }
    .value {
      text-align: left;
      background: #f9f9f9;
      padding: 6px 8px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    #map {
      width: 100%;
      height: 400px;
      background: #e3e3e3;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h2>Asset Maintenance Details</h2>
  <div class="container">
    <div id="assetDetails"></div>
    <div id="map">Map Area</div>
  </div>

  <script>
    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const dataString = params.get("data");

      if (!dataString) {
        document.getElementById("assetDetails").innerText = "No data found";
        return;
      }

      try {
        const asset = JSON.parse(decodeURIComponent(dataString));
        const fields = [
          ["PM Number", asset.pmNumber],
          ["Frequency", asset.frequency],
          ["Responsibility", asset.responsibility],
          ["Reason Of Work", asset.reason],
          ["Condition", asset.condition],
          ["Job Planner", asset.jobPlanner],
          ["Notes", asset.notes]
        ];

        const container = document.getElementById("assetDetails");
        container.innerHTML = fields.map(([label, value]) => `
          <div class="label">${label}:</div>
          <div class="value">${value || ""}</div>
        `).join("");
      } catch (e) {
        document.getElementById("assetDetails").innerText = "Invalid data format";
      }
    };
  </script>
</body>
</html>
