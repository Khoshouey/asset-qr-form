<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asset Maintenance Details</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="grid grid-cols-2 h-screen">
    <!-- Left: Asset Details -->
    <div class="p-6 overflow-auto">
      <h1 class="text-2xl font-bold mb-4 text-gray-800">Asset Maintenance Details</h1>
      <div id="assetDetails" class="divide-y divide-gray-200"></div>
    </div>

    <!-- Right: Map -->
    <div id="map" class="w-full h-full"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const dataParam = urlParams.get('data');
    const coordsParam = urlParams.get('coords');

    // ✅ Display the asset details in two columns
    if (dataParam) {
      const decodedData = decodeURIComponent(dataParam);
      const lines = decodedData.split('\n');
      const container = document.getElementById('assetDetails');

      lines.forEach(line => {
        const [label, value] = line.split(':');
        if (label && value !== undefined) {
          const row = document.createElement('div');
          row.className = 'grid grid-cols-2 gap-4 py-2';

          const labelEl = document.createElement('div');
          labelEl.textContent = label.trim();
          labelEl.className = 'font-semibold text-gray-700';

          const valueEl = document.createElement('div');
          valueEl.textContent = value.trim();
          valueEl.className = 'text-gray-900';

          row.appendChild(labelEl);
          row.appendChild(valueEl);
          container.appendChild(row);
        }
      });
    } else {
      document.getElementById('assetDetails').innerHTML =
        '<p class="text-red-600 font-semibold">Invalid data format</p>';
    }

    // 🗺️ Display map with marker
    if (coordsParam) {
      const decodedCoords = decodeURIComponent(coordsParam);
      const [lat, lng] = decodedCoords.split(',').map(Number);
      if (!isNaN(lat) && !isNaN(lng)) {
        const map = L.map('map').setView([lat, lng], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '© OpenStreetMap'
        }).addTo(map);
        L.marker([lat, lng]).addTo(map);
      }
    }
  </script>
</body>
</html>
