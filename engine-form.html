<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asset Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-xl mx-auto bg-white p-4 rounded shadow space-y-3">
    <h1 class="text-xl font-bold">Asset Maintenance Details</h1>
    <div id="result"></div>
    <div id="map" class="mt-4 h-64 w-full bg-gray-200 flex items-center justify-center rounded">No Coordinates</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get('data');
    const resultDiv = document.getElementById('result');

    if (!dataParam) {
      resultDiv.textContent = 'Invalid or missing data.';
    } else {
      const data = JSON.parse(decodeURIComponent(dataParam));

      for (const [key, value] of Object.entries(data)) {
        const row = document.createElement('div');
        row.className = 'border-b py-1';
        row.innerHTML = `<strong>${key}:</strong> ${value}`;
        resultDiv.appendChild(row);
      }

      if (data["Coords"]) {
        const coords = data["Coords"].split(',').map(s => s.trim());
        if (coords.length === 2) {
          const [lat, lon] = coords;
          const mapDiv = document.getElementById('map');
          mapDiv.innerHTML = `<iframe
            width="100%" height="100%" frameborder="0" style="border:0"
            src="https://www.google.com/maps?q=${lat},${lon}&hl=es;z=14&output=embed">
          </iframe>`;
        }
      }
    }
  </script>
</body>
</html>
