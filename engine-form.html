<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asset Maintenance Details</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f9fafb;
    }
    .container {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }
    .details {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .map {
      flex: 1;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    .data-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #e2e2e2;
    }
    .data-label {
      font-weight: bold;
      color: #333;
    }
    .data-value {
      color: #555;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="details">
      <h2>Asset Maintenance Details</h2>
      <div id="dataContainer"></div>
    </div>
    <div class="map">
      <div id="map"></div>
    </div>
  </div>

  <script>
    // Parse query string
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get("data");
    const coordsParam = params.get("coords");

    // Parse data safely
    if (dataParam) {
      const decoded = decodeURIComponent(dataParam);
      const lines = decoded.split("\n").filter(line => line.includes(":"));

      const container = document.getElementById("dataContainer");
      lines.forEach(line => {
        const [label, ...valueParts] = line.split(":");
        const value = valueParts.join(":").trim();
        if (label && value) {
          const row = document.createElement("div");
          row.className = "data-row";
          row.innerHTML = `<div class="data-label">${label.trim()}</div><div class="data-value">${value}</div>`;
          container.appendChild(row);
        }
      });
    } else {
      document.getElementById("dataContainer").innerText = "Invalid data format";
    }

    // Map
    if (coordsParam) {
      const decodedCoords = decodeURIComponent(coordsParam);
      const [lat, lng] = decodedCoords.split(",").map(Number);

      const map = L.map('map').setView([lat, lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      L.marker([lat, lng]).addTo(map).bindPopup("Asset Location").openPopup();
    }
  </script>
</body>
</html>
