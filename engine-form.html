<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asset Maintenance Details</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map { height: 100%; width: 100%; }
    .data-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background-color: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 0.75rem;
      align-items: center;
    }
    .data-label {
      font-weight: 600;
      color: #1e3a8a;
    }
    .data-value {
      text-align: right;
      color: #1f2937;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="grid grid-cols-1 md:grid-cols-2 h-screen">
    <!-- Left: Data -->
    <div class="p-6 overflow-y-auto">
      <h1 class="text-2xl font-bold mb-4 text-blue-700">Asset Maintenance Details</h1>
      <div id="data-container" class="space-y-3"></div>
    </div>

    <!-- Right: Map -->
    <div id="map"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get("data");
    const coordsParam = params.get("coords");

    // 🧾 Parse data and display it
    if (dataParam) {
      const decoded = decodeURIComponent(dataParam);
      const lines = decoded.split("\n").map(l => l.trim()).filter(l => l);
      const container = document.getElementById("data-container");
      let hasValid = false;

      lines.forEach(line => {
        const [label, ...rest] = line.split(":");
        if (rest.length) {
          hasValid = true;
          const value = rest.join(":").trim();
          const div = document.createElement("div");
          div.className = "data-row";
          div.innerHTML = `
            <div class="data-label">${label}</div>
            <div class="data-value">${value}</div>
          `;
          container.appendChild(div);
        }
      });

      if (!hasValid) {
        container.innerHTML = `<div class="text-red-600 font-bold">⚠️ No valid fields found.</div>`;
      }
    }

    // 🧭 Initialize map with Leaflet (no API key needed)
    if (coordsParam) {
      const coords = decodeURIComponent(coordsParam).split(",");
      const lat = parseFloat(coords[0]);
      const lng = parseFloat(coords[1]);
      const map = L.map('map').setView([lat, lng], 15);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

      L.marker([lat, lng]).addTo(map);
    }
  </script>
</body>
</html>
