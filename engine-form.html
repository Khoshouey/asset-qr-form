<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asset Maintenance Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .data-label {
      font-weight: 600;
      color: #1f2937;
      width: 45%;
    }
    .data-value {
      color: #374151;
      width: 50%;
      text-align: right;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen p-6">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-6xl mx-auto">
    <!-- Left: Data Display -->
    <div>
      <h2 class="text-2xl font-bold text-blue-700 mb-4">Asset Maintenance Details</h2>
      <div id="dataContainer" class="space-y-2"></div>
    </div>

    <!-- Right: Map -->
    <div>
      <h2 class="text-2xl font-bold text-green-700 mb-4">Location</h2>
      <div id="map" class="w-full h-96 rounded-lg shadow"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const data = params.get("data");
    const coords = params.get("coords");

    const container = document.getElementById("dataContainer");

    if (data) {
      try {
        const decoded = decodeURIComponent(data);
        const lines = decoded.split("\n").filter(line => line.includes(":"));

        lines.forEach(line => {
          const [label, ...valueParts] = line.split(":");
          const value = valueParts.join(":").trim();
          if (label && value) {
            const row = document.createElement("div");
            row.className = "data-row";
            row.innerHTML = `
              <div class="data-label">${label.trim()}</div>
              <div class="data-value">${value}</div>
            `;
            container.appendChild(row);
          }
        });
      } catch (e) {
        container.innerHTML = `<p class="text-red-600 font-semibold">Invalid data format</p>`;
      }
    } else {
      container.innerHTML = `<p class="text-gray-500 italic">No asset data found.</p>`;
    }

    // 🗺️ Initialize map
    if (coords) {
      const [lat, lng] = decodeURIComponent(coords).split(",").map(x => parseFloat(x.trim()));
      if (!isNaN(lat) && !isNaN(lng)) {
        const map = L.map("map").setView([lat, lng], 13);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap contributors"
        }).addTo(map);
        L.marker([lat, lng]).addTo(map).bindPopup("Asset Location").openPopup();
      }
    }
  </script>
</body>
</html>
