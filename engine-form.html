<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Engine Form — Asset Details</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --bg: #f4f6f8;
    --text: #333;
    --card-bg: #fff;
    --border: #ddd;
  }

  body {
    font-family: "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    max-width: 700px;
    width: 100%;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: var(--primary-dark);
  }

  .card {
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 20px;
    margin-bottom: 20px;
  }

  .label {
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
  }

  .data-box {
    width: 100%;
    min-height: 200px;
    padding: 10px;
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: monospace;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: #222;
  }

  #map {
    width: 100%;
    height: 300px;
    border-radius: 8px;
    overflow: hidden;
  }

  .actions {
    text-align: center;
    margin-top: 15px;
  }

  button {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover {
    background: var(--primary-dark);
  }

  @media (max-width: 600px) {
    .card { padding: 15px; }
    .data-box { font-size: 13px; }
    button { width: 100%; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🚀 Engine Form — Asset Details</h1>

  <div class="card">
    <label class="label">Asset Information (from QR)</label>
    <div id="qrData" class="data-box"></div>
  </div>

  <div class="card">
    <label class="label">Asset Location 📍</label>
    <div id="map">No coordinates available</div>
  </div>

  <div class="actions">
    <button onclick="window.print()">🖨️ Print Form</button>
  </div>
</div>

<script>
  // Extract data and coordinates from the URL
  const params = new URLSearchParams(window.location.search);
  const rawData = params.get("data");
  const coords = params.get("coords");

  // Fill data box
  const dataBox = document.getElementById("qrData");
  if (rawData) {
    dataBox.textContent = decodeURIComponent(rawData);
  } else {
    dataBox.textContent = "No data found in QR code.";
  }

  // Display Google Map if coordinates are available
  if (coords) {
    const [lat, lon] = coords.split(",").map(c => c.trim());
    if (lat && lon) {
      document.getElementById("map").innerHTML = `
        <iframe
          width="100%"
          height="300"
          style="border:0;"
          loading="lazy"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=${lat},${lon}&hl=en&z=16&output=embed">
        </iframe>`;
    }
  }
</script>

</body>
</html>
