<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Details</title>

<!-- CSV Parser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Tahoma, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 900px;
  margin: 20px auto;
  background: #fff;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h1 { text-align:center; color:#0077b6; }

.fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 20px;
}

.field {
  background: #f0f0f0;
  padding: 8px 10px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
}

.label { color: #555; }
.value { font-weight: bold; }

.tabs-container { margin-top: 30px; }

.tabs {
  text-align: center;
  margin-bottom: 10px;
}

.tab {
  padding: 8px 15px;
  margin: 3px;
  border: none;
  background: #ccc;
  cursor: pointer;
  border-radius: 5px;
  font-weight: bold;
}

.tab.active {
  background: #0077b6;
  color: white;
}

.task {
  background: #ffffff;
  border-left: 4px solid #0077b6;
  margin: 6px 0;
  padding: 10px;
  border-radius: 6px;
}
.error {
  color: red;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <h1>Asset Details</h1>

  <!-- Asset Info -->
  <div id="asset-fields" class="fields"></div>

  <!-- Tabs -->
  <div class="tabs-container">
    <h2 style="text-align:center;">Job Plan Tasks</h2>

    <div class="tabs">
      <button class="tab active" onclick="openTab('monthly', this)">Monthly</button>
      <button class="tab" onclick="openTab('3months', this)">3 Months</button>
      <button class="tab" onclick="openTab('6months', this)">6 Months</button>
    </div>

    <div id="tab-content"></div>
  </div>

</div>

<script>

// ✅ 1. READ QR DATA FROM URL
const params = new URLSearchParams(window.location.search);
const dataParam = params.get("data");

const container = document.getElementById("asset-fields");

let asset = null;

// ✅ 2. PARSE DATA
if (!dataParam) {
  container.innerHTML = `<div class="error">No QR data found</div>`;
} else {
  try {
    asset = JSON.parse(decodeURIComponent(dataParam));

    for (const [key, value] of Object.entries(asset)) {
      container.innerHTML += `
        <div class="field">
          <span class="label">${key}</span>
          <span class="value">${value}</span>
        </div>
      `;
    }

  } catch (e) {
    container.innerHTML = `<div class="error">Invalid QR data</div>`;
  }
}

// ✅ 3. LOAD CSV FROM YOUR GITHUB
async function loadCSV(fileName) {
  const baseURL = "https://raw.githubusercontent.com/Khoshouey/asset-jobplans/main/";
  const url = baseURL + fileName + ".csv";

  const response = await fetch(url);
  const text = await response.text();

  const data = Papa.parse(text, { header: true }).data;

  return data.map(row => ({
    id: row.TaskID,
    text: row.TaskDescription
  }));
}

// ✅ 4. TAB FUNCTION
async function openTab(tabName, el) {

  document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");

  let file = "PUMP-1"; // default

  if (tabName === "monthly") file = "PUMP-1";
  if (tabName === "3months") file = "PUMP-3";
  if (tabName === "6months") file = "PUMP-6";

  const tasks = await loadCSV(file);

  document.getElementById("tab-content").innerHTML =
    tasks.map(t => `<div class="task"><b>${t.id}</b> - ${t.text}</div>`).join("");
}

// ✅ 5. AUTO LOAD MONTHLY TAB
window.onload = () => {
  openTab('monthly', document.querySelector(".tab.active"));
};

</script>

</body>
</html>
