<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Details</title>

<!-- PapaParse for CSV -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Tahoma, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 0;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 20px auto;
  background: #fff;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Header */
h1 {
  text-align: center;
  color: #0077b6;
}

/* QR input */
#qrInput {
  width: 80%;
  padding: 8px;
  font-size: 14px;
  margin-bottom: 10px;
}

button {
  padding: 8px 15px;
  font-weight: bold;
  cursor: pointer;
  background: #0077b6;
  color: white;
  border: none;
  border-radius: 5px;
}

/* Asset fields */
.fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 20px;
}

.field {
  background: #f0f0f0;
  padding: 8px 10px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
}

.label {
  color: #555;
}

.value {
  font-weight: bold;
}

/* Tabs */
.tabs-container {
  margin-top: 30px;
}

.tabs {
  text-align: center;
  margin-bottom: 10px;
}

.tab {
  padding: 8px 15px;
  margin: 3px;
  border: none;
  background: #ccc;
  cursor: pointer;
  border-radius: 5px;
  font-weight: bold;
}

.tab.active {
  background: #0077b6;
  color: white;
}

/* Tasks */
.task {
  background: #ffffff;
  border-left: 4px solid #0077b6;
  margin: 6px 0;
  padding: 10px;
  border-radius: 6px;
  word-wrap: break-word;
}

/* Error */
.error {
  color: red;
  text-align: center;
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <h1>Asset Details</h1>

  <!-- QR Code Input -->
  <input id="qrInput" placeholder="Paste scanned QR code here..." />
  <button id="scanBtn">Load Asset</button>

  <!-- Asset Info -->
  <div id="asset-fields" class="fields"></div>

  <!-- Job Plan Tabs -->
  <div class="tabs-container">
    <h2>Job Plan Tasks</h2>

    <div class="tabs">
      <button class="tab active" onclick="openTab('monthly', this)">Monthly</button>
      <button class="tab" onclick="openTab('3months', this)">3 Months</button>
      <button class="tab" onclick="openTab('6months', this)">6 Months</button>
    </div>

    <div id="tab-content"></div>
  </div>

</div>

<script>
// Parse QR text into key-value pairs
function parseQRData(text) {
  const lines = text.split(/\r?\n/);
  const asset = {};
  lines.forEach(line => {
    const [key, ...rest] = line.split(':');
    if (key && rest.length > 0) asset[key.trim()] = rest.join(':').trim();
  });
  return asset;
}

// Load CSV from GitHub based on Job Plan name
async function loadJobPlanCSV(jobPlanName) {
  const csvURL = `https://raw.githubusercontent.com/Khoshouey/asset-jobplans/refs/heads/main/${jobPlanName}.csv`; 
  // <-- Replace <username>/<repo> with your GitHub info
  const response = await fetch(csvURL);
  const csvText = await response.text();
  const data = Papa.parse(csvText, { header: true }).data;
  return data.map(row => ({ id: row.TaskID, text: row.TaskDescription }));
}

// Tab function
async function openTab(tabName, el) {
  const container = document.getElementById("tab-content");
  document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");

  // Determine job plan CSV file
  let jobPlanCSV = "";
  if (tabName === "monthly") jobPlanCSV = "PUMP-1";
  else if (tabName === "3months") jobPlanCSV = "PUMP-3";
  else if (tabName === "6months") jobPlanCSV = "PUMP-6";

  const tasks = await loadJobPlanCSV(jobPlanCSV);

  container.innerHTML = tasks.map(t => `<div class="task"><b>${t.id}</b> - ${t.text}</div>`).join("");
}

// When user scans QR
document.getElementById("scanBtn").addEventListener("click", async () => {
  const qrText = document.getElementById("qrInput").value.trim();
  if (!qrText) return alert("Please paste scanned QR text!");

  const asset = parseQRData(qrText);
  const container = document.getElementById("asset-fields");
  container.innerHTML = "";

  for (const [key,value] of Object.entries(asset)) {
    container.innerHTML += `<div class="field"><span class="label">${key}</span><span class="value">${value}</span></div>`;
  }

  // Show default Monthly tab
  openTab('monthly', document.querySelector(".tab.active"));
});
</script>

</body>
</html>
