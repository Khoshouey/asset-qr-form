<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body {
    font-family: "Segoe UI", Roboto, sans-serif;
    background-color: #f4f6f8;
    color: #333;
    padding: 20px;
  }
  h2 { text-align:center; margin-bottom: 20px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 20px;
    max-width: 800px;
    margin: auto;
  }
  label { font-weight: 600; }
  input {
    width: 100%;
    padding: 6px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  #buttons {
    text-align:center;
    margin: 20px 0;
  }
  button {
    background-color: #2b6cb0;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    margin: 4px;
  }
  button:hover { background-color: #1e4e85; }
  #qrs {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
  }
  .qr-block {
    background: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    text-align: center;
  }
</style>
</head>
<body>

<h2>📍 Asset QR Generator</h2>

<div class="grid">
  <label>PM Number:</label>               <input id="pmNumber" value="12345">
  <label>Frequency:</label>               <input id="frequency" value="6 Months">
  <label>Responsibility:</label>          <input id="responsibility" value="Mechanical">
  <label>Reason Of Work:</label>          <input id="reason" value="Safety">
  <label>Condition:</label>               <input id="condition" value="Item offline">
  <label>Job Planner:</label>            <input id="planner" value="678">
  <label>Notes:</label>                  <input id="notes" value="Check before restart">
  <label>Asset Location [lat, lon]:</label> <input id="coords" value="28.137403674973083, 33.26561997210402">
</div>

<div id="buttons">
  <button id="generate">🚀 Generate QR</button>
</div>

<div id="qrs"></div>

<script>
document.getElementById("generate").addEventListener("click", () => {
  const pmNumber = document.getElementById("pmNumber").value.trim();
  const frequency = document.getElementById("frequency").value.trim();
  const responsibility = document.getElementById("responsibility").value.trim();
  const reason = document.getElementById("reason").value.trim();
  const condition = document.getElementById("condition").value.trim();
  const planner = document.getElementById("planner").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const coords = document.getElementById("coords").value.trim();

  // Build structured text
  const formattedText = [
    `PM Number: ${pmNumber}`,
    `Frequency: ${frequency}`,
    `Responsibility: ${responsibility}`,
    `Reason Of Work: ${reason}`,
    `Condition: ${condition}`,
    `Job Planner: ${planner}`,
    `Notes: ${notes}`
  ].join("\n");

  const encodedText = encodeURIComponent(formattedText);
  const encodedCoords = encodeURIComponent(coords);

  const formUrl = "https://khoshouey.github.io/asset-qr-form/engine-form.html"; // ✅ your GitHub Pages URL
  const qrUrl = `${formUrl}?data=${encodedText}&coords=${encodedCoords}`;

  const qrDiv = document.getElementById("qrs");
  qrDiv.innerHTML = "";

  const block = document.createElement("div");
  block.className = "qr-block";
  const label = document.createElement("p");
  label.textContent = "📌 Asset QR Code";
  const qrContainer = document.createElement("div");
  block.appendChild(label);
  block.appendChild(qrContainer);
  qrDiv.appendChild(block);

  new QRCode(qrContainer, {
    text: qrUrl,
    width: 280,
    height: 280,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.L
  });
});
</script>

</body>
</html>
