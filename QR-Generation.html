<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input, textarea { display: block; margin: 5px 0; padding: 5px; width: 250px; }
    #qrcode { margin-top: 15px; }
    button { margin-top: 10px; padding: 6px 10px; }
  </style>
</head>
<body>
  <h2>QR Code Generator</h2>

  <input id="pmNumber" placeholder="PM Number">
  <input id="frequency" placeholder="Frequency">
  <input id="responsibility" placeholder="Responsibility">
  <input id="reason" placeholder="Reason Of Work">
  <input id="condition" placeholder="Condition">
  <input id="jobPlanner" placeholder="Job Planner">
  <textarea id="notes" placeholder="Notes"></textarea>
  <input id="coords" placeholder="Coords (e.g., 28.13, 33.26)">

  <button onclick="generateQR()">Generate QR</button>
  <div id="qrcode"></div>
  <button onclick="copyQRImage()">📋 Copy QR Image</button>

  <script>
    let qrcodeInstance = null;

    function generateQR() {
      const dataObj = {
        "PM Number": document.getElementById('pmNumber').value.trim(),
        "Frequency": document.getElementById('frequency').value.trim(),
        "Responsibility": document.getElementById('responsibility').value.trim(),
        "Reason Of Work": document.getElementById('reason').value.trim(),
        "Condition": document.getElementById('condition').value.trim(),
        "Job Planner": document.getElementById('jobPlanner').value.trim(),
        "Notes": document.getElementById('notes').value.trim(),
        "Coords": document.getElementById('coords').value.trim()
      };

      const jsonString = JSON.stringify(dataObj);
      const encodedData = encodeURIComponent(jsonString);
      const url = `engine-form.html?data=${encodedData}`;

      // Clear previous QR
      document.getElementById("qrcode").innerHTML = "";
      qrcodeInstance = new QRCode(document.getElementById("qrcode"), {
        text: url,
        width: 200,
        height: 200
      });
    }

    async function copyQRImage() {
      const img = document.querySelector('#qrcode img');
      if (!img) {
        alert("Please generate the QR first!");
        return;
      }

      const response = await fetch(img.src);
      const blob = await response.blob();
      const item = new ClipboardItem({ "image/png": blob });
      await navigator.clipboard.write([item]);
      alert("✅ QR image copied to clipboard!");
    }
  </script>
</body>
</html>
