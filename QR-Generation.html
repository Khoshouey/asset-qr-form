<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asset QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --bg: #f4f6f8;
    --text: #333;
    --card-bg: #fff;
    --border: #ddd;
  }

  body {
    font-family: "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    max-width: 800px;
    width: 100%;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: var(--primary-dark);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 20px;
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-weight: 600;
    margin-bottom: 4px;
  }

  input {
    width: 100%;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
  }

  .full-width {
    grid-column: 1 / -1;
  }

  button {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    margin-right: 10px;
  }

  button:hover {
    background: var(--primary-dark);
  }

  #qrs {
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }

  .qr-block {
    background: var(--card-bg);
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    text-align: center;
  }

  @media (max-width: 600px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
    button { width: 100%; margin-top: 10px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>📌 Asset QR Generator</h1>

  <div class="form-grid">
    <div>
      <label>PM Number</label>
      <input type="text" id="pmNumber" value="12345">
    </div>
    <div>
      <label>Frequency</label>
      <input type="text" id="frequency" value="6 Months">
    </div>
    <div>
      <label>Responsibility</label>
      <input type="text" id="responsibility" value="Mechanical">
    </div>
    <div>
      <label>Reason Of Work</label>
      <input type="text" id="reason" value="Safety">
    </div>
    <div>
      <label>Condition</label>
      <input type="text" id="condition" value="Item Offline">
    </div>
    <div>
      <label>Job Planner</label>
      <input type="text" id="jobPlanner" value="678">
    </div>
    <div class="full-width">
      <label>Asset Location [lat, lon]</label>
      <input type="text" id="coords" value="28.137403674973083, 33.26561997210402">
    </div>
  </div>

  <div>
    <button id="generate">🚀 Generate QR</button>
  </div>

  <div id="qrs"></div>
</div>

<script>
  const formUrl = "https://khoshouey.github.io/asset-qr-form/engine-form.html";

  document.getElementById("generate").addEventListener("click", () => {
    const data = {
      "PM Number": document.getElementById("pmNumber").value.trim(),
      "Frequency": document.getElementById("frequency").value.trim(),
      "Responsibility": document.getElementById("responsibility").value.trim(),
      "Reason Of Work": document.getElementById("reason").value.trim(),
      "Condition": document.getElementById("condition").value.trim(),
      "Job Planner": document.getElementById("jobPlanner").value.trim()
    };

    const coords = document.getElementById("coords").value.trim();
    const encodedData = encodeURIComponent(JSON.stringify(data));
    const encodedCoords = encodeURIComponent(coords);

    const qrUrl = `${formUrl}?data=${encodedData}&coords=${encodedCoords}`;

    const qrDiv = document.getElementById("qrs");
    qrDiv.innerHTML = "";
    const block = document.createElement("div");
    block.className = "qr-block";
    block.innerHTML = "<h3>Generated QR</h3>";
    const qrContainer = document.createElement("div");
    block.appendChild(qrContainer);
    qrDiv.appendChild(block);

    new QRCode(qrContainer, {
      text: qrUrl,
      width: 260,
      height: 260,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.L
    });
  });
</script>

</body>
</html>
