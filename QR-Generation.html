<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Generator with GPS and Form Link</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body {
    font-family: "Segoe UI", Roboto, sans-serif;
    background-color: #f4f6f8;
    color: #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h2 { margin-bottom: 10px; }
  #sections { width: 90%; max-width: 700px; }
  .section {
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 15px;
    margin-bottom: 15px;
  }
  .section input, .section textarea {
    width: 100%;
    font-size: 14px;
    padding: 6px;
    margin-bottom: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  textarea { height: 120px; font-family: monospace; }
  button {
    background-color: #2b6cb0;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    margin: 4px;
  }
  button:hover { background-color: #1e4e85; }
  #qrs { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
  .qr-block {
    background: white; padding: 10px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;
  }
</style>
</head>
<body>

<h2>📍 Multi-Section QR Generator with Location</h2>

<div id="sections">
  <div class="section">
    <input type="text" placeholder="Section Title (e.g., PM Details)" value="Preventive Maintenance Details">
    <textarea>PM number: 12345
Frequency: 6 Months
Responsibility: Mechanical
Reason Of work: Safety
Condition: Item offline
Job Planner: 678</textarea>
    <input type="text" placeholder="Asset Location [lat, lon]" value="28.137403674973083, 33.26561997210402">
  </div>
</div>

<div>
  <button id="addSection">➕ Add Section</button>
  <button id="generate">🚀 Generate QRs</button>
</div>

<div id="qrs"></div>

<script>
document.getElementById("addSection").addEventListener("click", () => {
  const container = document.getElementById("sections");
  const div = document.createElement("div");
  div.className = "section";
  div.innerHTML = `
    <input type="text" placeholder="Section Title">
    <textarea placeholder="Enter section text here..."></textarea>
    <input type="text" placeholder="Asset Location [lat, lon]">`;
  container.appendChild(div);
});

document.getElementById("generate").addEventListener("click", () => {
  const sections = document.querySelectorAll(".section");
  const qrDiv = document.getElementById("qrs");
  qrDiv.innerHTML = "";

  const formUrl = "https://khoshouey.github.io/asset-qr-form/engine-form.html"; // 🔗 change to your real form URL


  sections.forEach(sec => {
    const title = sec.querySelector("input[type='text']").value.trim() || "Untitled Section";
    const textBody = sec.querySelector("textarea").value.trim();
    const coords = sec.querySelectorAll("input[type='text']")[1]?.value.trim();

    if (!textBody) return;

    const formattedText =
`------------------------------
${title}
------------------------------
${textBody}
------------------------------`;

    // Build full encoded URL
    const encodedText = encodeURIComponent(formattedText);
    const encodedCoords = encodeURIComponent(coords);
    const qrUrl = `${formUrl}?data=${encodedText}&coords=${encodedCoords}`;

    const block = document.createElement("div");
    block.className = "qr-block";
    const label = document.createElement("p");
    label.textContent = title;
    const qrContainer = document.createElement("div");
    block.appendChild(label);
    block.appendChild(qrContainer);
    qrDiv.appendChild(block);

    new QRCode(qrContainer, {
      text: qrUrl,
      width: 280,
      height: 280,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.L
    });
  });
});
</script>

</body>
</html>
