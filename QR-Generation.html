<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QR Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f6fa;
    }
    .container {
      display: flex;
      gap: 30px;
      max-width: 900px;
      margin: auto;
    }
    .form-section {
      flex: 1;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .qr-section {
      width: 280px;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 6px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    #qrcode img {
      margin-top: 10px;
    }
    #generatedUrl {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      font-size: 12px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <h2>Asset QR Generator</h2>
  <div class="container">
    <div class="form-section">
      <label>PM Number</label>
      <input id="pmNumber" type="text">

      <label>Frequency</label>
      <input id="frequency" type="text">

      <label>Responsibility</label>
      <input id="responsibility" type="text">

      <label>Reason Of Work</label>
      <input id="reason" type="text">

      <label>Condition</label>
      <input id="condition" type="text">

      <label>Job Planner</label>
      <input id="jobPlanner" type="text">

      <label>Notes</label>
      <textarea id="notes"></textarea>

      <button onclick="generateQRCode()">Generate QR Code</button>
    </div>

    <div class="qr-section">
      <div id="qrcode"></div>
      <input id="generatedUrl" readonly>
      <button onclick="copyURL()">Copy URL</button>
    </div>
  </div>

  <script>
    function generateQRCode() {
      const assetData = {
        pmNumber: document.getElementById("pmNumber").value,
        frequency: document.getElementById("frequency").value,
        responsibility: document.getElementById("responsibility").value,
        reason: document.getElementById("reason").value,
        condition: document.getElementById("condition").value,
        jobPlanner: document.getElementById("jobPlanner").value,
        notes: document.getElementById("notes").value
      };

      const encodedData = encodeURIComponent(JSON.stringify(assetData));
      const base = window.location.origin + window.location.pathname.replace('qr-generator.html','engine-form.html');
      const url = `${base}?data=${encodedData}`;
      document.getElementById("generatedUrl").value = url;

      const qrcodeDiv = document.getElementById("qrcode");
      qrcodeDiv.innerHTML = "";
      new QRCode(qrcodeDiv, {
        text: url,
        width: 250,
        height: 250
      });
    }

    function copyURL() {
      const urlField = document.getElementById("generatedUrl");
      urlField.select();
      document.execCommand("copy");
      alert("URL copied to clipboard ✅");
    }
  </script>
</body>
</html>
