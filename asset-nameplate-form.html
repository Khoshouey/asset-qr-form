<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Nameplate</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #f4f6f8; font-family: "Segoe UI", sans-serif; }
  .nameplate {
    max-width: 700px;
    margin: 40px auto;
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .logo {
    grid-column: 1 / -1;
    text-align: center;
    margin-bottom: 12px;
  }
  .field {
    display: flex;
    justify-content: space-between;
    padding: 4px 8px;
    background: #f0f0f0;
    border-radius: 6px;
    font-weight: 500;
  }
  .field-label { color: #555; }
  .field-value { color: #111; font-weight: 700; }
</style>
</head>
<body>

<div class="nameplate" id="nameplate">
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/Caterpillar_logo.svg" alt="Caterpillar Logo" style="height:50px;">
  </div>
  <!-- Fields will be inserted here dynamically -->
</div>

<script>
  // Get data from QR-scanned URL
  const params = new URLSearchParams(window.location.search);
  const rawData = params.get("data");

  const container = document.getElementById("nameplate");

  if (!rawData) {
    container.innerHTML += '<div style="grid-column:1/-1; text-align:center; color:red; font-weight:bold;">Invalid or missing data.</div>';
  } else {
    try {
      const dataObj = JSON.parse(decodeURIComponent(rawData));
      for (const [label, value] of Object.entries(dataObj)) {
        const fieldDiv = document.createElement("div");
        fieldDiv.className = "field";
        fieldDiv.innerHTML = `<span class="field-label">${label}</span><span class="field-value">${value}</span>`;
        container.appendChild(fieldDiv);
      }
    } catch (e) {
      container.innerHTML += '<div style="grid-column:1/-1; text-align:center; color:red; font-weight:bold;">Invalid data format.</div>';
    }
  }
</script>
</body>
</html>
