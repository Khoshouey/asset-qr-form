<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Nameplate Form</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #f4f6f8; font-family: "Segoe UI", sans-serif; padding: 20px; }
  .nameplate {
    max-width: 700px;
    margin: 40px auto;
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  }
  .logo { text-align: center; margin-bottom: 20px; }
  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field { display: flex; justify-content: space-between; padding: 6px 10px; background: #f0f0f0; border-radius: 6px; font-weight: 500; }
  .field-label { color: #555; }
  .field-value { color: #111; font-weight: 700; }
  #error { color: red; text-align: center; margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>

<div class="nameplate" id="nameplate">
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/Caterpillar_logo.svg" alt="Caterpillar Logo" style="height:50px;">
  </div>
  <div class="fields-grid" id="fields-container"></div>
  <div id="error"></div>
</div>

<script>
  // Get data from URL
  const params = new URLSearchParams(window.location.search);
  const dataParam = params.get("data");
  const container = document.getElementById("fields-container");
  const errorDiv = document.getElementById("error");

  if (!dataParam) {
    errorDiv.textContent = "❌ No data found in QR code.";
  } else {
    try {
      const dataObj = JSON.parse(decodeURIComponent(dataParam));
      for (const [label, value] of Object.entries(dataObj)) {
        const div = document.createElement("div");
        div.className = "field";
        div.innerHTML = `<span class="field-label">${label}</span><span class="field-value">${value}</span>`;
        container.appendChild(div);
      }
    } catch (e) {
      errorDiv.textContent = "❌ Invalid or missing data format.";
      console.error(e);
    }
  }
</script>

</body>
</html>
